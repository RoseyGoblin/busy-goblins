name: Release

# Triggers when a version tag (e.g. v0.1.0) is pushed.
# Builds the plugin and attaches the three required files
# as release assets so Obsidian can install it directly.
on:
  push:
    tags:
      - 'v*'

# Required so the workflow can create a GitHub release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
