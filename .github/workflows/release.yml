name: Release

# Triggers when a version tag (e.g. v0.1.0) is pushed.
# Builds the plugin and attaches the three required files
# as release assets so Obsidian can install it directly.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

# contents: write    — create releases and upload assets
# id-token: write    — required for artifact attestation
# attestations: write — required to persist attestation records
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest main.js provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js

      - name: Attest styles.css provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: styles.css
